<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gamified Exam | Quiz Arena</title>
    <link rel="shortcut icon" href="icon.jpg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0c10;
            --card: #12161c;
            --card2: #1a2029;
            --border: #2a2f38;
            --primary: #7c3aed;
            --primary-light: #9b6dff;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --radius: 16px;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .bn { font-family: 'Hind Siliguri', 'Inter', sans-serif; }

        /* Login & Language Screens (unchanged but styled) */
        #loginScreen, #langScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            background: radial-gradient(circle at 10% 20%, #1e1b2e, #0a0c10);
        }
        .login-card, .lang-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .login-card h2, .lang-card h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), #c026d3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .fi {
            width: 100%;
            padding: 0.9rem;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--primary), #c026d3);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .err-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--error);
            border-radius: 12px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            display: none;
            color: #f87171;
        }
        .lang-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .lang-choice {
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            cursor: pointer;
            text-align: center;
        }

        /* Exam Screen */
        #examScreen {
            display: none;
            min-height: 100vh;
            background: var(--bg);
        }
        /* Top bar: credits + timer + progress */
        .stats-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10,12,16,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
        }
        .stats-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .credit-badge, .timer-badge, .progress-badge {
            background: rgba(255,255,255,0.05);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .credit-badge { color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
        .timer-badge { color: var(--primary-light); border: 1px solid rgba(124,58,237,0.3); }
        .timer-badge.warning { color: var(--error); border-color: var(--error); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .progress-badge { color: var(--text-muted); }
        .progress-bar-bg {
            width: 120px;
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #c026d3);
            width: 0%;
            transition: width 0.3s;
        }

        /* Question Card */
        .quiz-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem 3rem;
        }
        .question-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .question-header {
            padding: 1rem 1.5rem;
            background: rgba(124,58,237,0.08);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .q-num {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-light);
        }
        .q-type {
            font-size: 0.75rem;
            padding: 0.2rem 0.7rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .question-text {
            padding: 1.5rem;
            font-size: 1.2rem;
            line-height: 1.6;
            border-bottom: 1px solid var(--border);
        }
        .question-text.bn { font-size: 1.3rem; font-family: 'Hind Siliguri', sans-serif; }
        .answer-area { padding: 1.5rem; }

        /* Options */
        .options-grid { display: flex; flex-direction: column; gap: 0.8rem; }
        .option {
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .option:hover { border-color: var(--primary); transform: translateX(4px); }
        .option-letter {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.08);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .option.correct { border-color: var(--success); background: rgba(16,185,129,0.1); }
        .option.wrong { border-color: var(--error); background: rgba(239,68,68,0.1); }
        .tf-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .tf-btn {
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
        }
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .match-item {
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }
        .match-item.matched { border-color: var(--success); background: rgba(16,185,129,0.1); }
        .blank-display {
            background: var(--card2);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            line-height: 1.7;
        }
        .blank-slot {
            display: inline-block;
            background: rgba(124,58,237,0.2);
            border-bottom: 2px solid var(--primary);
            min-width: 100px;
            padding: 0 0.5rem;
            border-radius: 6px;
        }
        .word-bank { display: flex; flex-wrap: wrap; gap: 0.7rem; margin-top: 1rem; }
        .word-chip {
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
        }
        .order-target {
            background: var(--card2);
            border: 2px dashed var(--border);
            border-radius: 12px;
            min-height: 80px;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .order-bank { display: flex; flex-wrap: wrap; gap: 0.7rem; }
        .order-item {
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
        }
        .btn-next {
            margin-top: 1.5rem;
            background: linear-gradient(135deg, var(--primary), #c026d3);
            border: none;
            border-radius: 60px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: none;
            width: 100%;
        }
        .btn-next.show { display: block; }
        .feedback-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border-left: 4px solid var(--success);
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            transition: 0.2s;
            z-index: 200;
            pointer-events: none;
        }
        .feedback-toast.wrong { border-left-color: var(--error); }
        .feedback-toast.show { transform: translateX(-50%) translateY(0); }

        /* Result Screen */
        #resultScreen {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .result-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin: 1.5rem 0; }
        .stat-box { background: var(--card2); border-radius: 12px; padding: 1rem; }
        .lb-list { margin-top: 1rem; text-align: left; }
        .lb-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 0.5rem; }
        .lb-rank { width: 28px; height: 28px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .lb-me { border: 1px solid var(--warning); }
        @media (max-width: 640px) {
            .stats-container { justify-content: center; }
            .match-grid { grid-template-columns: 1fr; }
        }
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 300;
        }
        .spin {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div class="feedback-toast" id="fbToast">✓ Correct!</div>

<!-- Login -->
<div id="loginScreen">
    <div class="login-card">
        <h2 id="examTitleLogin">✨ Loading Exam</h2>
        <p id="examSubInfo">Enter username to begin</p>
        <div class="err-msg" id="errMsg"></div>
        <div class="fg"><label>Username</label><input type="text" id="loginUser" class="fi" placeholder="Your username"></div>
        <button class="btn-login" onclick="doLogin()">Start Exam →</button>
        <div id="resumePrompt" style="margin-top: 1rem; font-size: 0.8rem; display: none;">
            <span id="resumeMsg"></span>
            <button onclick="resumeExam()" style="background: none; border: none; color: var(--primary); cursor: pointer;">Resume</button>
            <button onclick="clearResumeAndStart()" style="background: none; border: none; color: var(--error); cursor: pointer;">Start Over</button>
        </div>
    </div>
</div>

<!-- Language -->
<div id="langScreen">
    <div class="lang-card">
        <h2>Choose Language</h2>
        <div class="lang-btns">
            <div class="lang-choice" onclick="chooseLang('bn')">🇧🇩 বাংলা</div>
            <div class="lang-choice" onclick="chooseLang('en')">🇬🇧 English</div>
        </div>
    </div>
</div>

<!-- Exam -->
<div id="examScreen">
    <div class="stats-bar">
        <div class="stats-container">
            <div class="credit-badge">⭐ <span id="liveCredits">0</span> credits</div>
            <div class="timer-badge" id="timerDisplay">⏱️ <span id="timerSec">0</span>s</div>
            <div class="progress-badge">
                <span id="qCounter">0/0</span>
                <div class="progress-bar-bg"><div class="progress-fill" id="progFill"></div></div>
            </div>
        </div>
    </div>
    <div class="quiz-container">
        <div class="question-card">
            <div class="question-header">
                <span class="q-num" id="qNumLabel">Question 1</span>
                <span class="q-type" id="qtypeChip">MCQ</span>
            </div>
            <div class="question-text" id="qText"></div>
            <div class="answer-area" id="qAnswerArea"></div>
            <button class="btn-next" id="btnNext" onclick="nextQ()">Next Question →</button>
        </div>
    </div>
</div>

<!-- Result -->
<div id="resultScreen">
    <div class="result-card">
        <div class="result-icon" id="rIcon">🏆</div>
        <div class="result-title" id="rTitle">Complete!</div>
        <div class="stats-row">
            <div class="stat-box"><div>✅ Correct</div><div id="rCorrect">0</div></div>
            <div class="stat-box"><div>❌ Wrong</div><div id="rWrong">0</div></div>
            <div class="stat-box"><div>📊 Score</div><div id="rScore">0%</div></div>
        </div>
        <div class="credit-earned" style="background:rgba(245,158,11,0.1); border-radius:12px; padding:1rem; margin-bottom:1rem;">
            <h3>⭐ <span id="rCreditsEarned">0</span> Credits Earned</h3>
            <p>Total: <strong id="rTotalCredits">0</strong></p>
        </div>
        <div class="leaderboard">
            <h3>🏅 Class Leaderboard</h3>
            <div id="lbList" class="lb-list"><div class="spin"></div></div>
        </div>
        <button class="btn-login" onclick="goBack()" style="margin-top:1.5rem;">← Dashboard</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAlR-WEX_HZjkE1hzh_rPRYAz7CrjQYB54",
    authDomain: "exammanagementsystem-a7720.firebaseapp.com",
    projectId: "exammanagementsystem-a7720",
    storageBucket: "exammanagementsystem-a7720.firebasestorage.app",
    messagingSenderId: "269325070232",
    appId: "1:269325070232:web:79bdf01e4f47ea36bd45ed"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let examData = null, studentData = null, studentUsername = null;
let chosenLang = 'bn';
let questions = [], currentQ = 0, answered = false;
let correctCount = 0, wrongCount = 0, sessionCredits = 0;
let examId = null;
let timerInterval = null;
let timePerQuestion = 30; // default, will be overwritten by examData.timePerQuestion

// ---- localStorage keys ----
const STORAGE_KEY = "gamified_exam_progress";

function saveProgress() {
    if (!examId || !studentUsername) return;
    const progress = {
        examId, username: studentUsername,
        currentQ, correctCount, wrongCount, sessionCredits,
        answered, // not needed but store
        timestamp: Date.now()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

function loadProgress() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    try {
        const data = JSON.parse(raw);
        if (data.examId === examId && data.username === studentUsername) {
            return data;
        }
    } catch(e) {}
    return null;
}

function clearProgress() {
    localStorage.removeItem(STORAGE_KEY);
}

// ---- Resume logic ----
function checkResume() {
    const saved = loadProgress();
    if (saved && saved.currentQ < questions.length) {
        document.getElementById('resumeMsg').innerHTML = `You have an unfinished attempt (Q${saved.currentQ+1}). Resume?`;
        document.getElementById('resumePrompt').style.display = 'block';
        return true;
    }
    return false;
}

function resumeExam() {
    const saved = loadProgress();
    if (saved) {
        currentQ = saved.currentQ;
        correctCount = saved.correctCount;
        wrongCount = saved.wrongCount;
        sessionCredits = saved.sessionCredits;
        document.getElementById('liveCredits').textContent = sessionCredits;
        startExam(true);
    }
    document.getElementById('resumePrompt').style.display = 'none';
}

function clearResumeAndStart() {
    clearProgress();
    startExam(false);
}

// ---- Confetti ----
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let confParticles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
function launchConfetti(big = false) {
    const n = big ? 180 : 80;
    const colors = ['#f59e0b', '#10b981', '#7c3aed', '#ef4444'];
    for (let i = 0; i < n; i++) {
        confParticles.push({
            x: Math.random() * canvas.width, y: canvas.height * 0.4 * Math.random() - canvas.height * 0.2,
            w: Math.random() * 10 + 4, h: Math.random() * 6 + 3,
            r: Math.random() * Math.PI * 2, dr: Math.random() * 0.3 - 0.15,
            color: colors[Math.floor(Math.random() * colors.length)],
            dy: Math.random() * 3 + 2, dx: Math.random() * 2 - 1, gravity: 0.12, opacity: 1
        });
    }
    if (!animRunning) animConf();
}
let animRunning = false;
function animConf() {
    animRunning = true;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confParticles = confParticles.filter(p => p.opacity > 0.05);
    confParticles.forEach(p => {
        p.x += p.dx; p.y += p.dy; p.dy += p.gravity; p.r += p.dr; p.opacity -= 0.012;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r); ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
    });
    if (confParticles.length > 0) requestAnimationFrame(animConf);
    else animRunning = false;
}

function renderMath(el) {
    if (window.renderMathInElement) renderMathInElement(el, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }], throwOnError: false });
}

const examId_url = new URLSearchParams(location.search).get('id');
document.addEventListener('DOMContentLoaded', () => {
    if (!examId_url) { showScreen('login'); document.getElementById('examTitleLogin').textContent = 'Invalid link.'; return; }
    examId = examId_url;
    db.collection('gamifiedExams').doc(examId).get().then(doc => {
        if (!doc.exists || !doc.data().isActive) { document.getElementById('examTitleLogin').textContent = 'Exam not found.'; return; }
        examData = doc.data();
        timePerQuestion = examData.timePerQuestion || 30;
        document.getElementById('examTitleLogin').textContent = examData.title;
        document.getElementById('examSubInfo').innerHTML = (examData.className ? `📚 Class: ${examData.className} | ` : '') + `${examData.questions.length} questions`;
    }).catch(e => { document.getElementById('examTitleLogin').textContent = 'Error loading exam.'; });
    showScreen('login');
});

function showScreen(s) {
    ['loginScreen', 'langScreen', 'examScreen', 'resultScreen'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });
    document.getElementById(s + 'Screen').style.display = (s === 'result' || s === 'exam') ? 'flex' : '';
    if (s === 'result') document.getElementById('resultScreen').style.display = 'flex';
}

async function doLogin() {
    const username = document.getElementById('loginUser').value.trim();
    if (!username) { showErr('Enter username'); return; }
    const btn = document.querySelector('#loginScreen .btn-login');
    btn.disabled = true; btn.textContent = 'Checking...';
    try {
        let studentRef = await db.collection('students').doc(username).get();
        let student = studentRef.data();
        if (!student) {
            const newStudent = {
                studentName: username,
                className: examData.className || '',
                totalCredits: 0,
                creditHistory: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('students').doc(username).set(newStudent);
            student = newStudent;
        }
        if (examData.className && student.className && student.className !== examData.className) {
            showErr(`This exam is for class "${examData.className}". Your class is "${student.className}".`);
            btn.disabled = false; btn.textContent = 'Start Exam →';
            return;
        }
        studentData = student; studentUsername = username;
        if (examData.langMode === 'both') showScreen('lang');
        else { chosenLang = examData.langMode || 'bn'; startExam(false); }
    } catch(e) { showErr('Connection error.'); } finally {
        btn.disabled = false; btn.textContent = 'Start Exam →';
    }
}

function showErr(m) {
    const el = document.getElementById('errMsg');
    el.textContent = m; el.style.display = 'flex';
    setTimeout(() => el.style.display = 'none', 4000);
}
function chooseLang(l) { chosenLang = l; startExam(false); }

function startExam(resuming = false) {
    if (!examData) return;
    questions = [...examData.questions];
    if (!resuming) {
        // shuffle only if fresh start
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
        currentQ = 0; correctCount = 0; wrongCount = 0; sessionCredits = 0;
        clearProgress();
    } else {
        // when resuming, we keep currentQ etc.
    }
    document.getElementById('liveCredits').textContent = sessionCredits;
    showScreen('exam');
    renderQ();
}

function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}
function startTimer() {
    stopTimer();
    let timeLeft = timePerQuestion;
    const timerSpan = document.getElementById('timerSec');
    const timerBadge = document.querySelector('.timer-badge');
    timerSpan.textContent = timeLeft;
    timerBadge.classList.remove('warning');
    timerInterval = setInterval(() => {
        if (answered) return;
        timeLeft--;
        timerSpan.textContent = timeLeft;
        if (timeLeft <= 5) timerBadge.classList.add('warning');
        if (timeLeft <= 0) {
            stopTimer();
            if (!answered) {
                // time's up: mark as wrong
                handleAnswer(false);
            }
        }
    }, 1000);
}

function renderQ() {
    if (currentQ >= questions.length) { showResult(); return; }
    stopTimer();
    answered = false;
    const total = questions.length;
    const pct = Math.round((currentQ / total) * 100);
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('qCounter').textContent = `${currentQ+1}/${total}`;
    document.getElementById('qNumLabel').textContent = `Question ${currentQ+1} of ${total}`;
    const q = questions[currentQ];
    document.getElementById('qtypeChip').textContent = { mcq:'MCQ', truefalse:'True/False', matching:'Matching', fillblank:'Fill Blank', ordering:'Ordering' }[q.type] || q.type;
    const qTextEl = document.getElementById('qText');
    qTextEl.className = 'question-text' + (chosenLang === 'bn' ? ' bn' : '');
    qTextEl.textContent = chosenLang === 'en' ? (q.textEn || q.textBn) : (q.textBn || q.textEn);
    renderMath(qTextEl);
    document.getElementById('btnNext').classList.remove('show');
    const area = document.getElementById('qAnswerArea');
    if (q.type === 'mcq') renderMCQ(q, area);
    else if (q.type === 'truefalse') renderTF(q, area);
    else if (q.type === 'matching') renderMatching(q, area);
    else if (q.type === 'fillblank') renderFill(q, area);
    else if (q.type === 'ordering') renderOrdering(q, area);
    startTimer();
    saveProgress(); // save checkpoint
}

function renderMCQ(q, area) {
    const shuffle = ['A','B','C','D'].sort(() => Math.random() - 0.5);
    area.innerHTML = `<div class="options-grid">${shuffle.map(l => {
        const o = q.options[l];
        if (!o || (!o.bn && !o.en)) return '';
        const txt = chosenLang === 'bn' ? (o.bn || o.en) : (o.en || o.bn);
        return `<div class="option${chosenLang === 'bn' ? ' bn' : ''}" data-val="${l}" onclick="selectMCQ(this,'${l}','${q.correct}')">
            <div class="option-letter">${l}</div><span>${txt}</span>
        </div>`;
    }).join('')}</div>`;
    area.querySelectorAll('.option').forEach(el => renderMath(el));
}
function selectMCQ(el, val, correct) {
    if (answered) return; answered = true; stopTimer();
    const isCorrect = val === correct;
    el.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) document.querySelectorAll('.option').forEach(o => { if (o.dataset.val === correct) o.classList.add('show-correct'); });
    handleAnswer(isCorrect);
}
function renderTF(q, area) {
    area.innerHTML = `<div class="tf-buttons"><div class="tf-btn" onclick="selectTF(this,'true','${q.correct}')">✅ True</div><div class="tf-btn" onclick="selectTF(this,'false','${q.correct}')">❌ False</div></div>`;
}
function selectTF(el, val, correct) {
    if (answered) return; answered = true; stopTimer();
    const isCorrect = val === correct;
    el.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) document.querySelectorAll('.tf-btn').forEach(b => { if (b.onclick.toString().includes("'"+correct+"'")) b.classList.add('correct'); });
    handleAnswer(isCorrect);
}
// Matching simplified (full matching with penalty)
let matchSelLeft = null, matchPairsCompleted = 0, matchWrongOccurred = false;
function renderMatching(q, area) {
    matchSelLeft = null; matchPairsCompleted = 0; matchWrongOccurred = false;
    const pairs = q.pairs;
    const rightShuffled = [...pairs].sort(() => Math.random() - 0.5);
    area.innerHTML = `<div class="match-grid">
        <div class="match-col"><h4>Left</h4>${pairs.map((p,i) => `<div class="match-item${chosenLang === 'bn' ? ' bn' : ''}" data-idx="${i}" onclick="matchLeft(this,${i})">${chosenLang === 'bn' ? (p.lBn||p.lEn) : (p.lEn||p.lBn)}</div>`).join('')}</div>
        <div class="match-col"><h4>Right</h4>${rightShuffled.map((p,idx) => `<div class="match-item${chosenLang === 'bn' ? ' bn' : ''}" data-orig="${pairs.findIndex(x=>x===p)}" onclick="matchRight(this,${pairs.findIndex(x=>x===p)})">${chosenLang === 'bn' ? (p.rBn||p.rEn) : (p.rEn||p.rBn)}</div>`).join('')}</div>
    </div>`;
}
function matchLeft(el, idx) {
    if (el.classList.contains('matched')) return;
    document.querySelectorAll('.match-item').forEach(e => e.classList.remove('selected-l'));
    matchSelLeft = { el, idx };
    el.classList.add('selected-l');
}
function matchRight(el, origIdx) {
    if (!matchSelLeft || el.classList.contains('matched')) return;
    const isCorrect = matchSelLeft.idx === origIdx;
    if (isCorrect) {
        matchSelLeft.el.classList.remove('selected-l');
        matchSelLeft.el.classList.add('matched');
        el.classList.add('matched');
        matchPairsCompleted++;
        matchSelLeft = null;
        const total = questions[currentQ].pairs.length;
        if (matchPairsCompleted === total) {
            answered = true; stopTimer();
            handleAnswer(!matchWrongOccurred);
        }
    } else {
        el.classList.add('wrong-match');
        setTimeout(() => el.classList.remove('wrong-match'), 400);
        matchSelLeft.el.classList.remove('selected-l');
        matchSelLeft = null;
        if (!matchWrongOccurred) {
            matchWrongOccurred = true;
            // immediate penalty
            wrongCount++;
            sessionCredits = Math.max(0, sessionCredits - (examData.creditWrong || 2));
            document.getElementById('liveCredits').textContent = sessionCredits;
            showFeedback(false);
            saveProgress();
        }
    }
}
function renderFill(q, area) {
    const words = [...q.words].sort(() => Math.random() - 0.5);
    const qText = chosenLang === 'en' ? (q.textEn || q.textBn) : (q.textBn || q.textEn);
    const displayed = qText.replace(/___/g, `<span class="blank-slot" id="blankSlot">___</span>`);
    area.innerHTML = `<div class="blank-display${chosenLang === 'bn' ? ' bn' : ''}">${displayed}</div>
        <div class="word-bank">${words.map(w => `<div class="word-chip${chosenLang === 'bn' ? ' bn' : ''}" data-id="${w.id}" onclick="selectWord(this,'${w.id}','${q.correctWordId}')">${chosenLang === 'bn' ? (w.bn||w.en) : (w.en||w.bn)}</div>`).join('')}</div>`;
    renderMath(area.querySelector('.blank-display'));
}
function selectWord(el, wid, correctId) {
    if (answered) return; answered = true; stopTimer();
    const isCorrect = String(wid) === String(correctId);
    const slot = document.getElementById('blankSlot');
    if (slot) { slot.textContent = el.textContent; slot.classList.add('filled'); }
    el.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) document.querySelector(`.word-chip[data-id="${correctId}"]`)?.classList.add('correct');
    handleAnswer(isCorrect);
}
let ordPlaced = [];
function renderOrdering(q, area) {
    ordPlaced = [];
    const items = [...q.items].sort(() => Math.random() - 0.5);
    area.innerHTML = `<div class="order-target" id="ordTarget"><span style="color:var(--text-muted);">Drop order here</span></div>
        <div class="order-bank">${items.map((it,i) => `<div class="order-item${chosenLang === 'bn' ? ' bn' : ''}" data-correct="${it.correctPos}" onclick="placeOrd(this,${it.correctPos})">${chosenLang === 'bn' ? (it.bn||it.en) : (it.en||it.bn)}</div>`).join('')}</div>`;
}
function placeOrd(el, correctPos) {
    if (answered) return;
    if (el.classList.contains('placed')) {
        ordPlaced = ordPlaced.filter(p => p.el !== el);
        el.classList.remove('placed');
        refreshOrdTarget();
        return;
    }
    ordPlaced.push({ el, correctPos });
    el.classList.add('placed');
    refreshOrdTarget();
    if (ordPlaced.length === questions[currentQ].items.length) {
        answered = true; stopTimer();
        let isCorrect = ordPlaced.every((p, idx) => p.correctPos === idx+1);
        refreshOrdTarget(isCorrect);
        handleAnswer(isCorrect);
    }
}
function refreshOrdTarget(result = null) {
    const t = document.getElementById('ordTarget');
    if (!t) return;
    if (!ordPlaced.length) { t.innerHTML = '<span style="color:var(--text-muted);">Drop order here</span>'; return; }
    t.innerHTML = ordPlaced.map((p,i) => `<div class="order-item placed" style="${result===false?'border-color:var(--error)':result===true?'border-color:var(--success)':''}"><span style="background:rgba(245,158,11,0.2); border-radius:50%; width:22px; display:inline-block; text-align:center;">${i+1}</span> ${p.el.textContent}</div>`).join('');
}
function handleAnswer(isCorrect) {
    const cr = examData.creditRight || 5;
    const cw = examData.creditWrong || 2;
    if (isCorrect) { correctCount++; sessionCredits += cr; launchConfetti(false); }
    else { wrongCount++; sessionCredits = Math.max(0, sessionCredits - cw); }
    document.getElementById('liveCredits').textContent = sessionCredits;
    showFeedback(isCorrect);
    saveProgress();
    setTimeout(() => {
        document.getElementById('btnNext').classList.add('show');
    }, 600);
}
function showFeedback(ok) {
    const toast = document.getElementById('fbToast');
    toast.textContent = ok ? `✓ Correct! +${examData.creditRight||5} ⭐` : `✗ Wrong! -${examData.creditWrong||2} ⭐`;
    toast.className = 'feedback-toast' + (ok ? '' : ' wrong');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
}
function nextQ() {
    currentQ++;
    renderQ();
}
async function showResult() {
    launchConfetti(true);
    const total = questions.length;
    const pct = total ? Math.round((correctCount/total)*100) : 0;
    document.getElementById('rCorrect').textContent = correctCount;
    document.getElementById('rWrong').textContent = wrongCount;
    document.getElementById('rScore').textContent = pct+'%';
    const prevCredits = studentData.totalCredits || 0;
    const netGain = sessionCredits;
    document.getElementById('rCreditsEarned').textContent = netGain;
    document.getElementById('rTotalCredits').textContent = prevCredits + netGain;
    try {
        await db.collection('students').doc(studentUsername).update({
            totalCredits: firebase.firestore.FieldValue.increment(netGain),
            creditHistory: firebase.firestore.FieldValue.arrayUnion({ examId, examTitle: examData.title, earned: netGain, correct: correctCount, wrong: wrongCount, date: new Date().toISOString() })
        });
        await db.collection('gamifiedSubmissions').add({
            examId, examTitle: examData.title, username: studentUsername, studentName: studentData.studentName || studentUsername,
            className: studentData.className, correct: correctCount, wrong: wrongCount, total, pct, creditsEarned: netGain, lang: chosenLang,
            submittedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch(e) { console.error(e); }
    clearProgress();
    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'flex';
    loadLeaderboard();
}
async function loadLeaderboard() {
    const el = document.getElementById('lbList');
    try {
        const snap = await db.collection('students').where('className','==',studentData.className).orderBy('totalCredits','desc').limit(10).get();
        if (snap.empty) { el.innerHTML = '<div>No data</div>'; return; }
        el.innerHTML = snap.docs.map((d,i) => {
            const sd = d.data();
            const isMe = d.id === studentUsername;
            return `<div class="lb-item${isMe ? ' lb-me' : ''}"><div class="lb-rank">${i+1}</div><div>${sd.studentName||d.id}${isMe ? ' (You)' : ''}</div><div style="margin-left:auto;">⭐ ${sd.totalCredits||0}</div></div>`;
        }).join('');
    } catch(e) { el.innerHTML = '<div>Leaderboard unavailable</div>'; }
}
function goBack() { window.location.href = `student-dashboard.html?user=${studentUsername}`; }
document.addEventListener('keypress', e => { if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') doLogin(); });
</script>
